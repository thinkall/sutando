name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  typecheck-and-test:
    name: tsc + tests (clean install)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Catches local-time timestamps mislabeled as UTC (issue #908 / #909).
      # No deps needed â€” runs on the runner's stock python3.
      - name: UTC timestamp check
        run: python3 scripts/check-utc-z-strftime.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # `npm ci` installs deps AND optionalDependencies. This catches the
      # failure mode PR #234 introduced: a new static import of a package
      # that isn't actually resolvable from a clean checkout. If a PR adds
      # a dep but forgets to update package-lock.json (or forgets to use
      # lazy imports for optional deps), this step fails fast.
      - name: Install dependencies (clean)
        run: npm ci

      # Python test deps. Most tests are stdlib-only; secret-scanner needs
      # detect-secrets (requirements.txt). Must run BEFORE `npm test`: the
      # `test` script chains `npm run test:py`, so Python tests execute
      # inside the "Run tests" step, not only in the standalone step below.
      - name: Install Python test deps
        run: python3 -m pip install -r requirements.txt

      - name: Typecheck
        run: npm run typecheck

      # skills/*/scripts TS was previously invisible to tsc (tsconfig include
      # was src-only) â€” dead options like vadConfig/googleSearch on session
      # configs and broken imports slipped through to runtime. Issue #1586.
      - name: Typecheck skills
        run: npm run typecheck:skills

      - name: Run tests
        run: npm test
        if: hashFiles('tests/**/*.test.ts') != ''

      # Run standalone Python tests (*.test.py).
      # Covers telegram-bridge TOFU tri-state, slack-bridge tier-map, discord-bridge
      # access tiers, result-markers, secret-scanner, and more. See #897.
      #
      # Quiet mode: suppress PASS lines (only FAIL + summary shown) to keep CI
      # log compact across 32+ test files. Non-zero exit on any failure.
      - name: Run Python standalone tests
        run: |
          failed=0
          while IFS= read -r f; do
            echo "â†’ $f"
            output=$(python3 "$f" 2>&1)
            rc=$?
            # Always show FAIL lines and summary
            echo "$output" | grep -E 'FAIL|^Results:' || true
            if [ $rc -ne 0 ]; then
              # Test failed â€” emit full output (PASS + FAIL + traceback) so
              # debugging info isn't dropped on ImportError / uncaught exception.
              echo "$output"
              failed=1
            fi
          done < <(find tests -name '*.test.py' -not -path '*/node_modules/*' | sort)
          exit "$failed"
